<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — RespiAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container d-flex flex-column align-items-center justify-content-center" style="min-height:100vh;">
        <div class="text-center">
            <div class="gradient-text display-1 fw-900 mb-3">{{ code }}</div>
            <h2 class="fw-bold mb-3" style="color: var(--text-primary);">
                {% if code == 404 %}
                    Page Not Found
                {% elif code == 500 %}
                    Server Error
                {% else %}
                    Something Went Wrong
                {% endif %}
            </h2>
            <p class="text-muted mb-4">{{ message }}</p>
            <a href="/" class="btn-glow">
                <i class="fa-solid fa-house me-2"></i>Back to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
